name: Quantum CI

on:
  pull_request:
    branches: ["**"]

permissions:
  contents: read
  pull-requests: write   # required to post PR comments

jobs:
  quantum-analysis:
    runs-on: ubuntu-latest

    steps:
      # ── 1. Checkout PR branch ──────────────────────────────────────────────
      # Both checkouts live side-by-side in the workspace so the CLI can
      # load circuits from each independently.
      - name: Checkout PR branch
        uses: actions/checkout@v4
        with:
          ref: ${{ github.event.pull_request.head.sha }}
          path: pr_branch
          fetch-depth: 1

      # ── 2. Checkout base branch ────────────────────────────────────────────
      - name: Checkout base branch
        uses: actions/checkout@v4
        with:
          ref: ${{ github.event.pull_request.base.ref }}
          path: base_branch
          fetch-depth: 1

      # ── 3. Set up Python ───────────────────────────────────────────────────
      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: pip
          cache-dependency-path: pr_branch/requirements.txt

      # ── 4. Install dependencies ────────────────────────────────────────────
      # The editable install of pr_branch makes `quantum_ci` importable and
      # also installs qiskit, qiskit-aer, PyYAML, and requests.
      - name: Install dependencies
        run: |
          pip install --upgrade pip
          pip install -e pr_branch/

      # ── 5. Run Quantum CI ──────────────────────────────────────────────────
      # Always exits 0 — results are posted as a PR comment regardless of
      # circuit changes. The comment includes build status, complexity deltas,
      # and a shot distribution comparison with TVD.
      - name: Run Quantum CI analysis
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          PR_PATH:      ${{ github.workspace }}/pr_branch
          BASE_PATH:    ${{ github.workspace }}/base_branch
          PR_NUMBER:    ${{ github.event.pull_request.number }}
          REPO:         ${{ github.repository }}
        run: |
          python -m quantum_ci.cli \
            --pr-path   "$PR_PATH"   \
            --base-path "$BASE_PATH" \
            --pr-number "$PR_NUMBER" \
            --repo      "$REPO"
