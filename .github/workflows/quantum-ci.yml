name: Quantum CI

on:
  pull_request:
    branches: ["**"]
  workflow_dispatch:  # allows manual triggering from the Actions tab

permissions:
  contents: read
  pull-requests: write

jobs:
  quantum-analysis:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4  # needed so `uses: ./` resolves action.yml

      - uses: ./
        with:
          python-version: '3.11'
          # Uncomment and set thresholds to override quantum-ci.yaml values:
          # tvd-block-threshold: '0.1'
          # transpilation-decay-threshold: '15.0'
          # otlp-endpoint: 'http://your-collector:4318'

      # Persist the JSONL drift history as a workflow artifact so longitudinal
      # data survives across workflow runs.
      - name: Upload drift history
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: quantum-ci-history
          path: .quantum-ci-history.jsonl
          if-no-files-found: ignore
          retention-days: 90
