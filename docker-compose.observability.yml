# docker-compose.observability.yml
# ─────────────────────────────────────────────────────────────────────────────
# Local observability stack: OpenTelemetry Collector → Prometheus → Grafana
#
# Usage:
#   docker compose -f docker-compose.observability.yml up -d
#
# Then run Quantum CI with:
#   quantum-ci --otlp-endpoint http://localhost:4318 ...
#
# Grafana dashboard available at: http://localhost:3000
#   (login: admin / admin — no password required in dev mode)
# ─────────────────────────────────────────────────────────────────────────────

services:
  otel-collector:
    image: otel/opentelemetry-collector-contrib:0.98.0
    command: ["--config=/etc/otelcol-contrib/config.yaml"]
    volumes:
      - ./otel-collector-config.yml:/etc/otelcol-contrib/config.yaml:ro
    ports:
      - "4317:4317"   # OTLP gRPC receiver
      - "4318:4318"   # OTLP HTTP receiver  ← quantum-ci sends here
      - "8888:8888"   # Collector's own Prometheus metrics
      - "8889:8889"   # Prometheus exporter for quantum-ci metrics
    restart: unless-stopped

  prometheus:
    image: prom/prometheus:v2.51.0
    volumes:
      - ./prometheus.yml:/etc/prometheus/prometheus.yml:ro
      - prometheus_data:/prometheus
    ports:
      - "9090:9090"
    command:
      - "--config.file=/etc/prometheus/prometheus.yml"
      - "--storage.tsdb.path=/prometheus"
      - "--web.enable-lifecycle"
    restart: unless-stopped
    depends_on:
      - otel-collector

  grafana:
    image: grafana/grafana:10.4.0
    ports:
      - "3000:3000"
    environment:
      - GF_AUTH_ANONYMOUS_ENABLED=true
      - GF_AUTH_ANONYMOUS_ORG_ROLE=Admin
      - GF_AUTH_DISABLE_LOGIN_FORM=true
      - GF_FEATURE_TOGGLES_ENABLE=publicDashboards
    volumes:
      - grafana_data:/var/lib/grafana
      - ./grafana/provisioning:/etc/grafana/provisioning:ro
    restart: unless-stopped
    depends_on:
      - prometheus

volumes:
  prometheus_data:
  grafana_data:
